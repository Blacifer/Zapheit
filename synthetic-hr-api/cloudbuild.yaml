steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/zapheit/zapheit-api:$COMMIT_SHA'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/zapheit/zapheit-api:latest'
      - '.'
    dir: 'synthetic-hr-api'

  # Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/zapheit/zapheit-api'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'synthetic-hr-api'
      - '--image=asia-south1-docker.pkg.dev/$PROJECT_ID/zapheit/zapheit-api:$COMMIT_SHA'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3001'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--cpu-boost'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--timeout=60'
      - '--concurrency=80'
      - '--service-account=zapheit-api@$PROJECT_ID.iam.gserviceaccount.com'
      - >-
        --set-secrets=NODE_ENV=NODE_ENV:latest,SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest,SUPABASE_SERVICE_KEY=SUPABASE_SERVICE_KEY:latest,JWT_SECRET=JWT_SECRET:latest,DATABASE_URL=DATABASE_URL:latest,FRONTEND_URL=FRONTEND_URL:latest,API_URL=API_URL:latest,CORS_ALLOWED_ORIGINS=CORS_ALLOWED_ORIGINS:latest,INTEGRATIONS_ENCRYPTION_KEY=INTEGRATIONS_ENCRYPTION_KEY:latest,ERASURE_SIGNING_SALT=ERASURE_SIGNING_SALT:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,RASI_OPENAI_API_KEY=RASI_OPENAI_API_KEY:latest,RASI_ANTHROPIC_API_KEY=RASI_ANTHROPIC_API_KEY:latest,RASI_OPENROUTER_API_KEY=RASI_OPENROUTER_API_KEY:latest,EMAIL_PROVIDER=EMAIL_PROVIDER:latest,EMAIL_FROM=EMAIL_FROM:latest,ALERT_EMAIL_TO=ALERT_EMAIL_TO:latest,RESEND_API_KEY=RESEND_API_KEY:latest,CASHFREE_CLIENT_ID=CASHFREE_CLIENT_ID:latest,CASHFREE_CLIENT_SECRET=CASHFREE_CLIENT_SECRET:latest,CASHFREE_API_VERSION=CASHFREE_API_VERSION:latest,CASHFREE_ENVIRONMENT=CASHFREE_ENVIRONMENT:latest,CASHFREE_WEBHOOK_SECRET=CASHFREE_WEBHOOK_SECRET:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,SLACK_CLIENT_ID=SLACK_CLIENT_ID:latest,SLACK_CLIENT_SECRET=SLACK_CLIENT_SECRET:latest,SLACK_SIGNING_SECRET=SLACK_SIGNING_SECRET:latest,MICROSOFT_CLIENT_ID=MICROSOFT_CLIENT_ID:latest,MICROSOFT_CLIENT_SECRET=MICROSOFT_CLIENT_SECRET:latest,ZOHO_CLIENT_ID=ZOHO_CLIENT_ID:latest,ZOHO_CLIENT_SECRET=ZOHO_CLIENT_SECRET:latest,LINKEDIN_CLIENT_ID=LINKEDIN_CLIENT_ID:latest,LINKEDIN_CLIENT_SECRET=LINKEDIN_CLIENT_SECRET:latest,SALESFORCE_CLIENT_ID=SALESFORCE_CLIENT_ID:latest,SALESFORCE_CLIENT_SECRET=SALESFORCE_CLIENT_SECRET:latest,INTERCOM_CLIENT_ID=INTERCOM_CLIENT_ID:latest,INTERCOM_CLIENT_SECRET=INTERCOM_CLIENT_SECRET:latest,QUICKBOOKS_CLIENT_ID=QUICKBOOKS_CLIENT_ID:latest,QUICKBOOKS_CLIENT_SECRET=QUICKBOOKS_CLIENT_SECRET:latest,DEEL_CLIENT_ID=DEEL_CLIENT_ID:latest,DEEL_CLIENT_SECRET=DEEL_CLIENT_SECRET:latest,GUSTO_CLIENT_ID=GUSTO_CLIENT_ID:latest,GUSTO_CLIENT_SECRET=GUSTO_CLIENT_SECRET:latest,FLOCK_CLIENT_ID=FLOCK_CLIENT_ID:latest,FLOCK_CLIENT_SECRET=FLOCK_CLIENT_SECRET:latest,HUBSPOT_CLIENT_ID=HUBSPOT_CLIENT_ID:latest,HUBSPOT_CLIENT_SECRET=HUBSPOT_CLIENT_SECRET:latest,CONNECTORS_ENABLED=CONNECTORS_ENABLED:latest,CROSS_BORDER_PII_MASKING=CROSS_BORDER_PII_MASKING:latest,REDTEAM_INTERVAL_MINUTES=REDTEAM_INTERVAL_MINUTES:latest,RECRUITMENT_SCORING_MODEL=RECRUITMENT_SCORING_MODEL:latest,OTEL_ENABLED=OTEL_ENABLED:latest,OTEL_EXPORTER_OTLP_ENDPOINT=OTEL_EXPORTER_OTLP_ENDPOINT:latest,OTEL_EXPORTER_OTLP_TIMEOUT=OTEL_EXPORTER_OTLP_TIMEOUT:latest,OTEL_EXPORTER_OTLP_INSECURE=OTEL_EXPORTER_OTLP_INSECURE:latest,OTEL_TRACES_EXPORTER=OTEL_TRACES_EXPORTER:latest,OTEL_METRICS_EXPORTER=OTEL_METRICS_EXPORTER:latest

images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/zapheit/zapheit-api:$COMMIT_SHA'
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/zapheit/zapheit-api:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
