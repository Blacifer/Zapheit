services:
  synthetic-hr-runtime:
    build:
      context: ../../synthetic-hr-runtime
    environment:
      SYNTHETICHR_CONTROL_PLANE_URL: ${SYNTHETICHR_CONTROL_PLANE_URL:-http://localhost:3001}
      SYNTHETICHR_GATEWAY_URL: ${SYNTHETICHR_GATEWAY_URL:-}
      SYNTHETICHR_RUNTIME_ID: ${SYNTHETICHR_RUNTIME_ID}
      SYNTHETICHR_ENROLLMENT_TOKEN: ${SYNTHETICHR_ENROLLMENT_TOKEN}
      SYNTHETICHR_RUNTIME_SECRET: ${SYNTHETICHR_RUNTIME_SECRET:-}
      SYNTHETICHR_RUNTIME_SECRET_FILE: ${SYNTHETICHR_RUNTIME_SECRET_FILE:-/data/runtime_secret}
      SYNTHETICHR_API_KEY: ${SYNTHETICHR_API_KEY}
      SYNTHETICHR_POLL_INTERVAL_MS: ${SYNTHETICHR_POLL_INTERVAL_MS:-2000}
      SYNTHETICHR_HEARTBEAT_INTERVAL_MS: ${SYNTHETICHR_HEARTBEAT_INTERVAL_MS:-15000}
      SYNTHETICHR_MODEL: ${SYNTHETICHR_MODEL:-openai/gpt-4o-mini}
      SYNTHETICHR_STREAM_MODE: ${SYNTHETICHR_STREAM_MODE:-poll}
    volumes:
      - runtime-data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

volumes:
  runtime-data:
