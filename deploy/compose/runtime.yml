services:
  zapheit-runtime:
    build:
      context: ../../zapheit-runtime
    environment:
      ZAPHEIT_CONTROL_PLANE_URL: ${ZAPHEIT_CONTROL_PLANE_URL:-http://localhost:3001}
      ZAPHEIT_GATEWAY_URL: ${ZAPHEIT_GATEWAY_URL:-}
      ZAPHEIT_RUNTIME_ID: ${ZAPHEIT_RUNTIME_ID}
      ZAPHEIT_ENROLLMENT_TOKEN: ${ZAPHEIT_ENROLLMENT_TOKEN}
      ZAPHEIT_RUNTIME_SECRET: ${ZAPHEIT_RUNTIME_SECRET:-}
      ZAPHEIT_RUNTIME_SECRET_FILE: ${ZAPHEIT_RUNTIME_SECRET_FILE:-/data/runtime_secret}
      ZAPHEIT_API_KEY: ${ZAPHEIT_API_KEY}
      ZAPHEIT_POLL_INTERVAL_MS: ${ZAPHEIT_POLL_INTERVAL_MS:-2000}
      ZAPHEIT_HEARTBEAT_INTERVAL_MS: ${ZAPHEIT_HEARTBEAT_INTERVAL_MS:-15000}
      ZAPHEIT_MODEL: ${ZAPHEIT_MODEL:-openai/gpt-4o-mini}
      ZAPHEIT_STREAM_MODE: ${ZAPHEIT_STREAM_MODE:-poll}
    volumes:
      - runtime-data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

volumes:
  runtime-data:
