# Zapheit — unified self-host stack
#
# One-command launch:
#   cp deploy/compose/stack.env.example deploy/compose/stack.env
#   # edit stack.env with your values
#   docker compose -f deploy/compose/docker-compose.yml --env-file deploy/compose/stack.env up -d
#
# The runtime service is in the "runtime" profile and is disabled by default.
# Customers who want to run their own job executor on-prem enable it with:
#   docker compose ... --profile runtime up -d

services:

  # ── Database ────────────────────────────────────────────────────────────────
  zapheit-postgres:
    image: postgres:16-alpine
    container_name: zapheit-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-synthetic_hr}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - zapheit-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # ── API ─────────────────────────────────────────────────────────────────────
  zapheit-api:
    build:
      context: ../../zapheit-api
    env_file:
      - ./stack.env
    ports:
      - "${ZAPHEIT_API_PORT:-3001}:3001"
    depends_on:
      zapheit-postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # ── Frontend ─────────────────────────────────────────────────────────────────
  zapheit-ui:
    build:
      context: ../../zapheit-ui
    ports:
      - "${ZAPHEIT_FRONTEND_PORT:-8080}:80"
    environment:
      ZAPHEIT_API_URL: ${ZAPHEIT_API_URL:-http://localhost:3001/api}
      ZAPHEIT_SUPABASE_URL: ${ZAPHEIT_SUPABASE_URL}
      ZAPHEIT_SUPABASE_ANON_KEY: ${ZAPHEIT_SUPABASE_ANON_KEY}
      ZAPHEIT_SENTRY_DSN: ${ZAPHEIT_SENTRY_DSN:-}
      ZAPHEIT_APP_VERSION: ${ZAPHEIT_APP_VERSION:-}
      ZAPHEIT_ERROR_REPORTING_URL: ${ZAPHEIT_ERROR_REPORTING_URL:-}
    depends_on:
      - zapheit-api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  # ── Runtime worker (optional, enable with --profile runtime) ─────────────────
  zapheit-runtime:
    profiles:
      - runtime
    build:
      context: ../../zapheit-runtime
    environment:
      ZAPHEIT_CONTROL_PLANE_URL: ${ZAPHEIT_CONTROL_PLANE_URL:-http://zapheit-api:3001}
      ZAPHEIT_GATEWAY_URL: ${ZAPHEIT_GATEWAY_URL:-}
      ZAPHEIT_RUNTIME_ID: ${ZAPHEIT_RUNTIME_ID}
      ZAPHEIT_ENROLLMENT_TOKEN: ${ZAPHEIT_ENROLLMENT_TOKEN}
      ZAPHEIT_RUNTIME_SECRET: ${ZAPHEIT_RUNTIME_SECRET:-}
      ZAPHEIT_RUNTIME_SECRET_FILE: ${ZAPHEIT_RUNTIME_SECRET_FILE:-/data/runtime_secret}
      ZAPHEIT_API_KEY: ${ZAPHEIT_API_KEY}
      ZAPHEIT_POLL_INTERVAL_MS: ${ZAPHEIT_POLL_INTERVAL_MS:-2000}
      ZAPHEIT_HEARTBEAT_INTERVAL_MS: ${ZAPHEIT_HEARTBEAT_INTERVAL_MS:-15000}
      ZAPHEIT_MODEL: ${ZAPHEIT_MODEL:-openai/gpt-4o-mini}
      ZAPHEIT_STREAM_MODE: ${ZAPHEIT_STREAM_MODE:-poll}
    volumes:
      - runtime-data:/data
    depends_on:
      - zapheit-api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

volumes:
  zapheit-postgres-data:
  runtime-data:
