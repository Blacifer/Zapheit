services:
  synthetic-hr-api:
    build:
      context: ../../synthetic-hr-api
    env_file:
      - ./control-plane.env
    ports:
      - "${SYNTHETICHR_API_PORT:-3001}:3001"
    restart: unless-stopped

  synthetic-hr-frontend:
    build:
      context: ../../synthetic-hr
    ports:
      - "${SYNTHETICHR_FRONTEND_PORT:-8080}:80"
    environment:
      # These values are written into /runtime-config.js by the container entrypoint.
      SYNTHETICHR_API_URL: ${SYNTHETICHR_API_URL:-http://localhost:3001/api}
      SYNTHETICHR_SUPABASE_URL: ${SYNTHETICHR_SUPABASE_URL}
      SYNTHETICHR_SUPABASE_ANON_KEY: ${SYNTHETICHR_SUPABASE_ANON_KEY}
      SYNTHETICHR_SENTRY_DSN: ${SYNTHETICHR_SENTRY_DSN:-}
      SYNTHETICHR_APP_VERSION: ${SYNTHETICHR_APP_VERSION:-}
      SYNTHETICHR_ERROR_REPORTING_URL: ${SYNTHETICHR_ERROR_REPORTING_URL:-}
    restart: unless-stopped

