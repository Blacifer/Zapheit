version: 2
updates:
  - package-ecosystem: npm
    directory: /zapheit-api
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    ignore:
      # Keep Dependabot configured, but suppress routine version-bump PRs.
      # We only want manual dependency updates unless a separate security alert requires action.
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
          - "version-update:semver-patch"

  - package-ecosystem: npm
    directory: /zapheit
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
          - "version-update:semver-patch"

  - package-ecosystem: npm
    directory: /zapheit-runtime
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
          - "version-update:semver-patch"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
          - "version-update:semver-patch"
