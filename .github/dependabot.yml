version: 2
updates:
  - package-ecosystem: npm
    directory: /synthetic-hr-api
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    ignore:
      # Patch bumps for stable infra deps — low value, high noise
      - dependency-name: "typescript"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "@types/*"
        update-types: ["version-update:semver-patch"]

  - package-ecosystem: npm
    directory: /synthetic-hr
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "@types/*"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "eslint*"
        update-types: ["version-update:semver-patch"]

  - package-ecosystem: npm
    directory: /synthetic-hr-runtime
    schedule:
      interval: monthly
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
