name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zapheit-api
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: zapheit-api/package-lock.json
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
      - name: Contract check
        run: npm run check:contracts
      - name: Unit & integration tests
        run: npm test -- --coverage
      - name: Security regression
        run: npx jest --no-coverage --testPathPattern security-regression
      - name: Upload coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: zapheit-api/coverage/
          retention-days: 7

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zapheit
    env:
      PNPM_STORE_PATH: ~/.pnpm-store
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Configure pnpm store
        run: |
          mkdir -p "${PNPM_STORE_PATH}"
          pnpm config set store-dir "${PNPM_STORE_PATH}"
          pnpm store path
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('zapheit/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm exec tsc --noEmit
      - name: Build
        run: pnpm run build
      - name: Tests
        run: pnpm run test:coverage
      - name: Upload coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: zapheit/coverage/
          retention-days: 7

  migration-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check migration numbering
        run: |
          cd zapheit-database
          # Verify no duplicate migration numbers (except known 022 pair)
          nums=$(ls migration_*.sql | sed 's/migration_\([0-9]*\).*/\1/' | sort)
          dupes=$(echo "$nums" | uniq -d)
          if [ -n "$dupes" ]; then
            echo "⚠️  Duplicate migration numbers: $dupes"
            # Known exception: migration_022 has two files
            known="022"
            unknown=$(echo "$dupes" | grep -v "$known" || true)
            if [ -n "$unknown" ]; then
              echo "❌ Unexpected duplicate migration numbers: $unknown"
              exit 1
            fi
            echo "✅ Only known duplicates (022) — OK"
          fi
      - name: Check RLS pattern consistency
        run: |
          cd zapheit-database
          # Ensure no migration references the non-existent organization_members table
          if grep -rn "organization_members" migration_*.sql; then
            echo "❌ Found references to non-existent organization_members table"
            exit 1
          fi
          echo "✅ All RLS policies use correct table references"
