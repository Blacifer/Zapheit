name: Deploy API via Cloud Build

on:
  push:
    branches: [main]
    paths:
      - 'zapheit-api/**'
      - 'deploy/gcp/**'
      - '.github/workflows/deploy-api-cloudbuild.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-api-cloudbuild
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1044003479182/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: cloudbuild-deployer@rasisynthetichr.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: rasisynthetichr

      - name: Run deploy-api Cloud Build trigger
        run: |
          gcloud builds triggers run deploy-api \
            --region=asia-south1 \
            --substitutions=COMMIT_SHA=${GITHUB_SHA}
