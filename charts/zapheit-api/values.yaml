image:
  repository: zapheit-api
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  port: 3001

env:
  NODE_ENV: "production"
  PORT: "3001"

  # Supabase
  SUPABASE_URL: ""
  SUPABASE_ANON_KEY: ""
  SUPABASE_SERVICE_KEY: ""
  JWT_SECRET: ""
  DATABASE_URL: ""

  # URLs
  FRONTEND_URL: ""
  API_URL: ""
  CORS_ALLOWED_ORIGINS: ""

  # Encryption (CRITICAL: must match values used at data-write time — never rotate without re-encrypting)
  INTEGRATIONS_ENCRYPTION_KEY: ""
  ERASURE_SIGNING_SALT: ""

  # AI Providers
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  RASI_OPENAI_API_KEY: ""
  RASI_ANTHROPIC_API_KEY: ""
  RASI_OPENROUTER_API_KEY: ""

  # Email
  EMAIL_PROVIDER: "resend"
  EMAIL_FROM: ""
  ALERT_EMAIL_TO: ""
  RESEND_API_KEY: ""

  # Payments
  CASHFREE_CLIENT_ID: ""
  CASHFREE_CLIENT_SECRET: ""
  CASHFREE_API_VERSION: "2023-08-01"
  CASHFREE_ENVIRONMENT: "production"
  CASHFREE_WEBHOOK_SECRET: ""

  # OAuth Integrations
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  SLACK_CLIENT_ID: ""
  SLACK_CLIENT_SECRET: ""
  SLACK_SIGNING_SECRET: ""
  MICROSOFT_CLIENT_ID: ""
  MICROSOFT_CLIENT_SECRET: ""
  ZOHO_CLIENT_ID: ""
  ZOHO_CLIENT_SECRET: ""
  LINKEDIN_CLIENT_ID: ""
  LINKEDIN_CLIENT_SECRET: ""
  SALESFORCE_CLIENT_ID: ""
  SALESFORCE_CLIENT_SECRET: ""
  INTERCOM_CLIENT_ID: ""
  INTERCOM_CLIENT_SECRET: ""
  QUICKBOOKS_CLIENT_ID: ""
  QUICKBOOKS_CLIENT_SECRET: ""
  DEEL_CLIENT_ID: ""
  DEEL_CLIENT_SECRET: ""
  GUSTO_CLIENT_ID: ""
  GUSTO_CLIENT_SECRET: ""
  FLOCK_CLIENT_ID: ""
  FLOCK_CLIENT_SECRET: ""
  HUBSPOT_CLIENT_ID: ""
  HUBSPOT_CLIENT_SECRET: ""

  # Feature Flags
  CONNECTORS_ENABLED: "true"
  CROSS_BORDER_PII_MASKING: "false"
  SCHEMA_COMPAT_STRICT_OPTIONAL: "true"
  REDTEAM_INTERVAL_MINUTES: "0"
  RECRUITMENT_SCORING_MODEL: "gpt-4o-mini"

  # Observability
  OTEL_ENABLED: "false"
  OTEL_EXPORTER_OTLP_ENDPOINT: ""
  OTEL_EXPORTER_OTLP_TIMEOUT: "10000"
  OTEL_EXPORTER_OTLP_INSECURE: "true"
  OTEL_TRACES_EXPORTER: "console"
  OTEL_METRICS_EXPORTER: "console"

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi
